version: 2
before:
  hooks:
    - go mod tidy
builds:
  - id: claudeclaw
    main: ./cmd/claudeclaw
    binary: claudeclaw
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/lustan3216/claudeclaw/internal/buildinfo.Version={{.Version}}
archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: "checksums.txt"
release:
  github:
    owner: lustan3216
    name: claudeclaw
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
