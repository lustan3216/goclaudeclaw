name: Release
on:
  push:
    tags:
      - 'v*'
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build binaries
        run: |
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X github.com/lustan3216/claudeclaw/internal/buildinfo.Version=${VERSION}"
          mkdir -p dist

          for GOOS in linux darwin; do
            for GOARCH in amd64 arm64; do
              OUT="dist/claudeclaw_${VERSION}_${GOOS}_${GOARCH}.tar.gz"
              BINARY="claudeclaw"
              CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build -ldflags "$LDFLAGS" -o "$BINARY" ./cmd/claudeclaw/
              tar -czf "$OUT" "$BINARY"
              rm "$BINARY"
            done
          done

          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o claudeclaw.exe ./cmd/claudeclaw/
          zip "dist/claudeclaw_${VERSION}_windows_amd64.zip" claudeclaw.exe
          rm claudeclaw.exe

          cd dist && sha256sum * > checksums.txt

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          NOTES=$(git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --oneline 2>/dev/null || echo "Initial release")
          gh release create "$VERSION" dist/* \
            --title "claudeclaw $VERSION" \
            --notes "$NOTES"
